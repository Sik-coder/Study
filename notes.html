<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>수학 개념노트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1E2330; --muted:#6B7280; --faint:#9AA1AD;
    --paper:#FFFFFF; --bg:#F6F7FB;
    --pen:#2F4B9A; --pen-dark:#23397A; --pen-soft:#E9EDF8;
    --amber:#C77A1E; --amber-soft:#FBF1E0;
    --green:#1C8F6B;
    --line:#E3E7EF;
    --shadow:0 16px 36px -22px rgba(30,40,70,.4);
    --eng:'Space Grotesk', system-ui, sans-serif;
    --kor:'Noto Sans KR', system-ui, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{font-family:var(--kor); color:var(--ink); background:var(--bg); min-height:100vh; min-height:100dvh;
    -webkit-font-smoothing:antialiased; padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  .wrap{max-width:560px; margin:0 auto; padding:26px 20px 48px}
  .topbar{display:flex; align-items:center; gap:10px; margin-bottom:22px}
  .topbar a{text-decoration:none; font-size:13px; font-weight:700; color:var(--pen); background:var(--pen-soft); padding:8px 14px; border-radius:99px; white-space:nowrap}
  .topbar .sp{margin-left:auto}
  .head{display:flex; align-items:center; gap:13px; margin-bottom:8px}
  .mark{width:46px; height:46px; flex:none; background:var(--paper); border:1px solid var(--line); border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:24px; box-shadow:var(--shadow)}
  .head h1{font-size:21px; font-weight:900; letter-spacing:-.01em}
  .head p{font-size:12.5px; color:var(--muted); margin-top:2px}
  .list{display:flex; flex-direction:column; gap:13px; margin-top:22px}
  .note{display:flex; align-items:center; gap:14px; width:100%; text-align:left; text-decoration:none; color:inherit;
    background:var(--paper); border:1px solid var(--line); border-radius:18px; padding:17px 17px; box-shadow:var(--shadow); transition:transform .12s ease}
  .note:active{transform:scale(.985)}
  .note .ic{width:50px; height:50px; flex:none; border-radius:13px; background:var(--pen-soft); color:var(--pen-dark); display:flex; align-items:center; justify-content:center; font-size:25px}
  .note .tx{flex:1}
  .note .tx h2{font-size:16.5px; font-weight:800}
  .note .tx p{font-size:12.5px; color:var(--muted); margin-top:2px; font-weight:500}
  .note .go{font-family:var(--eng); font-weight:700; font-size:19px; color:var(--pen); flex:none}
  .note .tag{display:inline-block; font-family:var(--eng); font-size:10px; font-weight:700; letter-spacing:.08em; color:var(--amber); background:var(--amber-soft); padding:2px 7px; border-radius:99px; margin-bottom:4px}
  .empty{text-align:center; color:var(--faint); font-size:13px; padding:30px 0}
  .foot{text-align:center; font-size:12px; color:var(--faint); margin-top:26px; line-height:1.7}
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a href="math.html">← 수학 문제</a>
      <a href="index.html" class="sp">↔ 과목</a>
    </div>

    <div class="head">
      <span class="mark">📝</span>
      <div>
        <h1>수학 개념노트</h1>
        <p>한 장으로 외우는 핵심 개념 모음</p>
      </div>
    </div>

    <div class="list" id="list"></div>

    <div class="foot">노트는 계속 추가될 예정이에요 ✏️</div>
  </div>

<script>
  /* 개념노트 목록 — 새 노트는 여기 한 줄만 추가하면 돼요.
     { title:제목, desc:설명, file:'파일이름.html', tag:'영역(선택)', icon:'이모지(선택)' } */
  const NOTES = [
    { title:"수 체계", desc:"복소수 분류 가지치기 + 함정 + 분류 퀴즈", file:"number-system.html", tag:"수와 연산", icon:"🌳" },
  ];

  const list = document.getElementById('list');
  if(!NOTES.length){
    list.innerHTML = '<div class="empty">아직 노트가 없어요.</div>';
  } else {
    NOTES.forEach(n=>{
      const a = document.createElement('a');
      a.className = 'note';
      a.href = n.file;
      a.innerHTML =
        '<span class="ic">'+(n.icon||'📄')+'</span>'+
        '<span class="tx">'+(n.tag?('<span class="tag">'+n.tag+'</span>'):'')+
        '<h2>'+n.title+'</h2>'+(n.desc?('<p>'+n.desc+'</p>'):'')+'</span>'+
        '<span class="go">→</span>';
      list.appendChild(a);
    });
  }
</script>
</body>
</html>
