    --ink:#1E2330; --muted:#6B7280; --faint:#9AA1AD;

  .list{display:flex; flex-direction:column; gap:13px; margin-top:22px}

    box-shadow:var(--shadow); transition:transform .12s ease}
  .note:active{transform:scale(.985)}
  .note .ic{width:50px; height:50px; flex:none; border-radius:13px; background:var(--pen-soft);
    color:var(--pen-dark); display:flex; align-items:center; justify-content:center; font-size:25px}
  .note .tx{flex:1}
  .note .tx h2{font-size:16.5px; font-weight:800}
  .note .tx p{font-size:12.5px; color:var(--muted); margin-top:2px; font-weight:500}
  .note .go{font-family:var(--eng); font-weight:700; font-size:19px; color:var(--pen); flex:none}
  .note .tag{display:inline-block; font-family:var(--eng); font-size:10px; font-weight:700; letter-spacing:.08em;
    color:var(--amber); background:var(--amber-soft); padding:2px 7px; border-radius:99px; margin-bottom:4px}
  .sech{font-family:var(--eng); font-size:11.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;

  .empty{text-align:center; color:var(--faint); font-size:13px; padding:30px 0}
  .foot{text-align:center; font-size:12px; color:var(--faint); margin-top:26px; line-height:1.7}
  #detailView{padding:0}
  .dbar{display:flex; align-items:center; gap:10px; padding:12px 16px; background:var(--bg);

  .dbar button, .dbar a{font:inherit; cursor:pointer; text-decoration:none; font-size:13px; font-weight:700;

  .dbar .sp{margin-left:auto}
  .dbar .ttl{font-weight:800; font-size:14px; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  #viewer{flex:1; width:100%; border:none; background:#FBF6EA}
</style>

<!DOCTYPE html>

<style>
  :root{
    --paper:#FBF6EA; --ink:#33312C; --ink2:#6B675C;
    --blue:#2E5C9A; --red:#C0392B; --hl:rgba(255,214,64,.55);
    --line:#E4DDC9; --card:#FFFDF7;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:"Gaegu",system-ui,sans-serif; line-height:1.55;
    background-image:linear-gradient(90deg,transparent 38px,#EBC9C0 38px,#EBC9C0 40px,transparent 40px);
  }
  @media(max-width:560px){body{background-image:none;}}
  .wrap{max-width:760px; margin:0 auto; padding:0 26px 60px 52px;}
  @media(max-width:560px){.wrap{padding:0 20px 50px;}}

  header{padding:30px 0 6px;}
  .kicker{font-family:"Nanum Pen Script"; font-size:22px; color:var(--ink2); letter-spacing:.04em;}
  h1{font-family:"Nanum Pen Script"; font-size:48px; font-weight:400; margin:0; line-height:1.05;}
  .sub{font-size:17px; color:var(--ink2); margin:2px 0 0;}

  .sheet{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:18px 16px 20px; margin:22px 0 28px; box-shadow:0 2px 0 #ECE3CE;}

  .defbox{background:#FBF1DD; border:1.5px dashed #D9B98C; border-radius:12px;
    padding:12px 14px; margin-bottom:16px; font-size:19px; text-align:center;}
  .defbox b{font-family:"Nanum Pen Script"; font-size:24px; color:var(--blue);}
  .cols{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media(max-width:560px){.cols{grid-template-columns:1fr;}}
  .fbox{border:1px solid var(--line); border-radius:11px; padding:12px 14px; background:#FFFDF7;}
  .fbox h3{font-family:"Nanum Pen Script"; font-size:25px; font-weight:400; margin:0 0 8px;
    color:var(--ink); display:flex; align-items:center; gap:7px;}
  .fbox h3 small{font-family:"Gaegu"; font-size:13.5px; color:var(--ink2); font-weight:400;}
  .fbox ul{list-style:none; margin:0; padding:0; display:grid; gap:9px;}
  .fbox li{font-size:18.5px; line-height:1.5;}
  .fbox .blue{color:var(--blue); font-weight:700;}
  sup{font-size:.72em;} sub{font-size:.72em;}

  h2{font-family:"Nanum Pen Script"; font-size:30px; font-weight:400; margin:30px 0 12px;}
  .rules{list-style:none; padding:0; margin:0; display:grid; gap:14px;}
  .rules li{font-size:19px; line-height:1.5;}
  .hl{background:linear-gradient(var(--hl),var(--hl)); background-size:100% 62%;
    background-repeat:no-repeat; background-position:0 72%; padding:0 3px; font-weight:700;}
  .x{color:var(--red); font-weight:700;}
  .o{color:var(--blue); font-weight:700;}
  .rules small{display:block; font-size:15.5px; color:var(--ink2);}

  /* quiz */
  .quiz{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:20px 18px 22px; box-shadow:0 2px 0 #ECE3CE; text-align:center;}
  .qtop{display:flex; justify-content:space-between; font-size:16px; color:var(--ink2); margin-bottom:8px;}
  .qtop b{color:var(--ink); font-family:"Nanum Pen Script"; font-size:22px;}
  .qnum{font-family:"Nanum Pen Script"; font-size:50px; line-height:1.05; margin:8px 0 2px;}
  .qask{font-size:17px; color:var(--ink2); margin:0 0 16px;}
  .choices{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}
  .choice{font-family:"Gaegu"; font-weight:700; font-size:19px; color:var(--ink);
    background:var(--paper); border:2px solid var(--line); border-radius:12px; padding:12px 4px;
    cursor:pointer; transition:.14s;}
  .choice:hover:not(:disabled){border-color:var(--ink2);}
  .choice:disabled{cursor:default;}
  .choice.ok{background:#E7F1E0; border-color:#5E9A4E; color:#3C6B30;}

  .next{margin-top:14px; font-family:"Gaegu"; font-weight:700; font-size:18px; color:var(--paper);
    background:var(--ink); border:none; border-radius:12px; padding:10px 26px; cursor:pointer;
    opacity:0; pointer-events:none; transition:.18s;}
  .next.show{opacity:1; pointer-events:auto;}
  button:focus-visible{outline:2px solid var(--blue); outline-offset:2px;}

  .foot{font-family:"Nanum Pen Script"; font-size:20px; color:var(--ink2); text-align:center; margin-top:34px;}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;}}

<body>
<div class="wrap">
  <header>
    <div class="kicker">수능 개념노트 · 수학Ⅰ</div>
    <h1>지수와 로그</h1>
    <p class="sub">법칙은 외우고, 조건과 함정은 피하고</p>
  </header>

  <div class="sheet">
    <div class="defbox">
      로그의 정의 &nbsp; <b>log<sub>a</sub> b = c ⟺ a<sup>c</sup> = b</b><br>
      <span style="font-size:15.5px;color:#6B675C;">(밑) a&gt;0, a≠1 &nbsp;·&nbsp; (진수) b&gt;0</span>
    </div>

    <div class="cols">
      <div class="fbox">
        <h3>지수법칙 <small>a&gt;0, b&gt;0</small></h3>
        <ul>
          <li>a<sup>m</sup> · a<sup>n</sup> = <span class="blue">a<sup>m+n</sup></span></li>
          <li>a<sup>m</sup> ÷ a<sup>n</sup> = <span class="blue">a<sup>m−n</sup></span></li>
          <li>(a<sup>m</sup>)<sup>n</sup> = <span class="blue">a<sup>mn</sup></span></li>
          <li>(ab)<sup>n</sup> = a<sup>n</sup>b<sup>n</sup></li>
          <li>a<sup>0</sup> = 1 &nbsp;·&nbsp; a<sup>−n</sup> = <span class="blue">1 / a<sup>n</sup></span></li>
          <li>a<sup>m/n</sup> = <span class="blue"><sup>n</sup>√(a<sup>m</sup>)</span></li>
        </ul>
      </div>
      <div class="fbox">
        <h3>로그법칙 <small>M, N &gt; 0</small></h3>
        <ul>
          <li>log<sub>a</sub> a = 1 &nbsp;·&nbsp; log<sub>a</sub> 1 = 0</li>
          <li>log<sub>a</sub> MN = <span class="blue">log<sub>a</sub> M + log<sub>a</sub> N</span></li>
          <li>log<sub>a</sub> (M/N) = log<sub>a</sub> M − log<sub>a</sub> N</li>
          <li>log<sub>a</sub> M<sup>k</sup> = <span class="blue">k · log<sub>a</sub> M</span></li>
          <li>log<sub>a</sub> b = <span class="blue">log<sub>c</sub> b / log<sub>c</sub> a</span> <span style="font-size:14px;color:#6B675C;">(밑변환)</span></li>
          <li>a<sup>(log<sub>a</sub> b)</sup> = b</li>
        </ul>
      </div>
    </div>
  </div>

  <h2>이것만은 — 시험 함정</h2>
  <ul class="rules">
    <li><span class="hl">log는 곱셈만 덧셈으로 쪼갠다</span>.
      <small><span class="o">log<sub>a</sub> MN = log<sub>a</sub> M + log<sub>a</sub> N</span> &nbsp;⟶&nbsp;
      하지만 <span class="x">log<sub>a</sub>(M+N) ≠ log<sub>a</sub> M + log<sub>a</sub> N</span> (덧셈은 절대 못 쪼갬!)</small></li>
    <li><span class="hl">진수는 양수, 밑은 a&gt;0·a≠1</span> — 조건 먼저 확인.
      <small>log<sub>a</sub> b 문제에서 진수 b&gt;0, 밑 a&gt;0·a≠1 범위를 빠뜨리면 함정에 걸려요.</small></li>
    <li>지수가 진수에 붙으면 <span class="o">계수로 빠진다</span> — log<sub>a</sub> b<sup>k</sup> = k·log<sub>a</sub> b.
      <small>단 <span class="x">(log<sub>a</sub> b)<sup>2</sup> ≠ 2 log<sub>a</sub> b</span> — 괄호 위치(진수냐 로그 전체냐) 꼭 구분!</small></li>
    <li><span class="hl">음수 지수 = 역수</span> — <span class="o">a<sup>−n</sup> = 1/a<sup>n</sup></span>.
      <small>a<sup>−2</sup> 는 음수가 아니라 1/a<sup>2</sup> (분수예요).</small></li>
    <li>분수 지수 = 거듭제곱근 — <span class="o">a<sup>m/n</sup> = <sup>n</sup>√(a<sup>m</sup>)</span>.
      <small>9<sup>1/2</sup> = 3, &nbsp; 8<sup>2/3</sup> = 4. (분모가 근호 차수)</small></li>
    <li>밑이 다르면 <span class="o">밑변환</span>: log<sub>a</sub> b = log b / log a.
      <small>상용로그 log(밑 10 생략)로 바꿔 계산. &nbsp; log<sub>a</sub> b = 1 / log<sub>b</sub> a 도 자주 쓰임.</small></li>
  </ul>

  <h2>계산 퀴즈</h2>
  <div class="quiz">
    <div class="qtop"><span>맞춤 <b id="sc">0</b></span><span>푼 문제 <b id="tot">0</b></span></div>
    <div class="qnum" id="num">—</div>
    <p class="qask" id="ask">값을 계산해 보세요</p>
    <div class="choices" id="ch"></div>
    <div class="fb" id="fb"></div>
    <button class="next" id="next">다음 →</button>
  </div>

  <p class="foot">한 장으로 외우는 지수·로그 ✏️</p>
</div>

<script>
const QUIZ=[
  {n:'2³ × 2²', o:['2⁵','2⁶','4⁵'], a:'2⁵', e:'밑이 같으면 지수끼리 더한다: 3+2=5.'},
  {n:'(3²)³', o:['3⁵','3⁶','3⁸'], a:'3⁶', e:'지수끼리 곱한다: 2×3=6.'},
  {n:'2⁻²', o:['−4','1/4','−1/4'], a:'1/4', e:'음수 지수는 역수: 1/2²=1/4.'},
  {n:'9^(1/2)', o:['3','4.5','81'], a:'3', e:'분수 지수 1/2 = 제곱근: √9=3.'},
  {n:'8^(2/3)', o:['4','6','16'], a:'4', e:'∛8=2, 그 다음 제곱: 2²=4.'},
  {n:'log₂ 8', o:['2','3','4'], a:'3', e:'2³=8 이므로 3.'},
  {n:'log₃ 1', o:['0','1','3'], a:'0', e:'log_a 1 = 0 (a⁰=1).'},
  {n:'log₅ 5', o:['0','1','5'], a:'1', e:'log_a a = 1.'},
  {n:'log₁₀ 100', o:['1','2','10'], a:'2', e:'상용로그: 10²=100.'},
  {n:'log₆ 2 + log₆ 3', o:['0','1','6'], a:'1', e:'곱의 로그: log₆(2·3)=log₆6=1.'},
  {n:'log₂ 4 + log₂ 8', o:['5','6','32'], a:'5', e:'2+3=5 (또는 log₂32=5).'},
  {n:'log₂ 8³', o:['3','6','9'], a:'9', e:'지수는 계수로: 3·log₂8 = 3·3 = 9.'},
  {n:'log₂ (1/8)', o:['−3','3','1/3'], a:'−3', e:'1/8 = 2⁻³ 이므로 −3.'},
  {n:'5^(log₅ 7)', o:['5','7','35'], a:'7', e:'a^(log_a b)=b. 서로 역연산이라 7.'},
  {n:'3⁰ + log₇ 1', o:['0','1','2'], a:'1', e:'3⁰=1, log₇1=0 → 1+0=1.'}
];
let order=[],i=0,sc=0,tot=0;
const num=document.getElementById('num'),ch=document.getElementById('ch'),fb=document.getElementById('fb'),
  next=document.getElementById('next'),scEl=document.getElementById('sc'),totEl=document.getElementById('tot');
const shuffle=a=>{a=a.slice();for(let k=a.length-1;k>0;k--){const j=Math.random()*(k+1)|0;[a[k],a[j]]=[a[j],a[k]];}return a;};
function load(){
  if(i>=order.length){order=shuffle(QUIZ);i=0;}
  const q=order[i]; num.textContent=q.n; fb.textContent=''; fb.className='fb';
  next.classList.remove('show'); ch.innerHTML='';
  shuffle(q.o).forEach(o=>{const b=document.createElement('button');b.className='choice';b.textContent=o;
    b.onclick=()=>answer(b,o,q);ch.appendChild(b);});
}
function answer(btn,choice,q){
  [...ch.children].forEach(c=>{c.disabled=true;if(c.textContent===q.a)c.classList.add('ok');});
  tot++;
  if(choice===q.a){sc++;fb.innerHTML='정답!';fb.className='fb ok';}
  else{btn.classList.add('no');fb.innerHTML='아쉬워요';fb.className='fb no';}
  fb.innerHTML+=`<small>${q.n} = ${q.a} · ${q.e}</small>`;
  scEl.textContent=sc; totEl.textContent=tot; next.classList.add('show');
}
next.onclick=()=>{i++;load();};
order=shuffle(QUIZ); load();
<\/script>
</body>
</html>

  </script>

  <div class="sheet">
    <svg viewBox="0 0 760 320" role="img" aria-labelledby="gt gd">
      <title id="gt">지수함수와 로그함수 그래프</title>
      <desc id="gd">지수함수 y=a^x 와 로그함수 y=log_a x 는 직선 y=x에 대해 대칭이다. a>1이면 둘 다 증가한다. 지수함수는 x축(y=0)을, 로그함수는 y축(x=0)을 점근선으로 가진다.</desc>
      <!-- 좌표축 -->
      <g stroke="#C9Bfa6" stroke-width="1.5">
        <line x1="60" y1="290" x2="360" y2="290"/>
        <line x1="110" y1="20" x2="110" y2="310"/>
      </g>

      <text x="330" y="55" font-family="'Nanum Pen Script'" font-size="20" fill="#8B8062">y = x</text>

      <text x="300" y="40" font-family="'Nanum Pen Script'" font-size="24" fill="#2E5C9A">y = a&#8203;ˣ</text>
      <!-- 로그함수 y=log_a x : y축 점근선 -->
      <path d="M118 60 Q150 150 210 215 T350 282" fill="none" stroke="#C0392B" stroke-width="3" stroke-linecap="round"/>
      <text x="300" y="270" font-family="'Nanum Pen Script'" font-size="24" fill="#C0392B">y = logₐx</text>

      <circle cx="158" cy="290" r="4" fill="#C0392B"/><text x="150" y="308" font-family="'Nanum Pen Script'" font-size="18" fill="#C0392B">(1,0)</text>

        <text x="430" y="60" fill="#33312C">a &gt; 1  →  증가 ↗</text>
        <text x="430" y="100" fill="#6B675C" font-size="18">x 커질수록 y 커짐</text>
        <text x="430" y="160" fill="#33312C">0 &lt; a &lt; 1  →  감소 ↘</text>
        <text x="430" y="200" fill="#6B675C" font-size="18">x 커질수록 y 작아짐</text>
        <text x="430" y="258" fill="#2E5C9A">지수: 점근선 y=0 (x축)</text>

    <p class="cap">y = a<sup>x</sup> 와 y = log<sub>a</sub> x 는 <b>직선 y = x 에 대칭</b> (서로 역함수)</p>

        <li>a&gt;1 증가 ↗ &nbsp;/&nbsp; 0&lt;a&lt;1 감소 ↘</li>
      </ul>
    </div>
    <div class="pcard">
      <h3>로그함수 y=log<sub>a</sub>x</h3>

        <li>a&gt;1 증가 ↗ &nbsp;/&nbsp; 0&lt;a&lt;1 감소 ↘</li>
      </ul>
    </div>

    <li><span class="hl">대소 비교는 밑 a가 1보다 큰지 작은지로 갈린다</span>.
      <small>a&gt;1: 지수가 클수록 값이 큼 (방향 그대로). <span class="x">0&lt;a&lt;1: 부등호 방향이 뒤집힘!</span></small></li>
    <li>점근선에 <span class="o">닿거나 넘지 않는다</span> — 지수는 y=0, 로그는 x=0에 한없이 가까워질 뿐.
      <small>그래서 지수함수 값은 절대 0이나 음수가 안 돼요.</small></li>

</div>

<script>
const QUIZ=[
  {n:'y = log₂ x 의 정의역은?', o:['x>0','실수 전체','x≥1'], a:'x>0', e:'로그함수 진수>0 → 정의역 x>0.'},
  {n:'y = 3ˣ 의 치역은?', o:['y>0','실수 전체','y≥1'], a:'y>0', e:'지수함수 값은 항상 양수.'},
  {n:'y = 2ˣ 가 반드시 지나는 점', o:['(0,1)','(1,0)','(1,2)'], a:'(0,1)', e:'2⁰=1 → (0,1).'},
  {n:'y = log₃ x 가 반드시 지나는 점', o:['(0,1)','(1,0)','(3,1)'], a:'(1,0)', e:'log₃1=0 → (1,0).'},
  {n:'y = 2ˣ 의 점근선', o:['y=0','x=0','y=x'], a:'y=0', e:'지수함수 점근선은 x축 y=0.'},
  {n:'y = log₂ x 의 점근선', o:['y=0','x=0','y=1'], a:'x=0', e:'로그함수 점근선은 y축 x=0.'},
  {n:'y=aˣ 와 y=logₐx 의 대칭축', o:['y=x','x축','y축'], a:'y=x', e:'역함수 관계 → 직선 y=x 대칭.'},
  {n:'밑이 0<a<1 이면 y=aˣ 는?', o:['증가','감소','일정'], a:'감소', e:'밑이 1보다 작으면 감소함수 ↘.'},
  {n:'2³ 과 2⁵ 의 대소 (밑 2)', o:['2³<2⁵','2³>2⁵','같다'], a:'2³<2⁵', e:'밑>1이라 지수 큰 쪽이 큼.'},
  {n:'(½)³ 과 (½)⁵ 의 대소', o:['(½)³<(½)⁵','(½)³>(½)⁵','같다'], a:'(½)³>(½)⁵', e:'0<밑<1이라 부등호 뒤집힘!'},
  {n:'log₂ 5 와 log₂ 3 의 대소', o:['log₂5>log₂3','log₂5<log₂3','같다'], a:'log₂5>log₂3', e:'밑>1, 진수 큰 쪽이 큼.'},
  {n:'y = 2ˣ + 3 의 점근선', o:['y=0','y=3','x=3'], a:'y=3', e:'위로 3 평행이동 → 점근선 y=3.'},
  {n:'y = log₂(x−1) 의 정의역', o:['x>0','x>1','x>−1'], a:'x>1', e:'진수 x−1>0 → x>1.'},
  {n:'2ˣ = 2⁵ 이면 x = ?', o:['5','10','25'], a:'5', e:'밑 같으면 지수끼리 비교: x=5.'}
];
let order=[],i=0,sc=0,tot=0;
const num=document.getElementById('num'),ch=document.getElementById('ch'),fb=document.getElementById('fb'),
  next=document.getElementById('next'),scEl=document.getElementById('sc'),totEl=document.getElementById('tot');
const shuffle=a=>{a=a.slice();for(let k=a.length-1;k>0;k--){const j=Math.random()*(k+1)|0;[a[k],a[j]]=[a[j],a[k]];}return a;};
function load(){
  if(i>=order.length){order=shuffle(QUIZ);i=0;}
  const q=order[i]; num.textContent=q.n; fb.textContent=''; fb.className='fb';
  next.classList.remove('show'); ch.innerHTML='';
  shuffle(q.o).forEach(o=>{const b=document.createElement('button');b.className='choice';b.textContent=o;
    b.onclick=()=>answer(b,o,q);ch.appendChild(b);});
}
function answer(btn,choice,q){
  [...ch.children].forEach(c=>{c.disabled=true;if(c.textContent===q.a)c.classList.add('ok');});
  tot++;
  if(choice===q.a){sc++;fb.innerHTML='정답!';fb.className='fb ok';}
  else{btn.classList.add('no');fb.innerHTML='아쉬워요';fb.className='fb no';}
  fb.innerHTML+=`<small>${q.a} · ${q.e}</small>`;
  scEl.textContent=sc; totEl.textContent=tot; next.classList.add('show');
}
next.onclick=()=>{i++;load();};
order=shuffle(QUIZ); load();
<\/script>

      <path d="M70 70 q20 18 40 0 M160 70 q20 18 40 0 M255 70 q20 18 40 0 M350 70 q20 18 40 0"
            fill="none" stroke="#9DB7DC" stroke-width="1.6"/>
      <!-- 등비 -->
      <g font-family="'Nanum Pen Script'" font-size="26" fill="#C0392B">
        <text x="40" y="160">3</text><text x="130" y="160">6</text><text x="220" y="160">12</text><text x="310" y="160">24</text><text x="405" y="160">48</text>
      </g>
      <g font-family="'Nanum Pen Script'" font-size="18" fill="#6B675C">
        <text x="75" y="140">×2</text><text x="165" y="140">×2</text><text x="258" y="140">×2</text><text x="352" y="140">×2</text>
        <text x="500" y="160" fill="#C0392B" font-size="22">등비: 공비 r=2 (곱하기)</text>
      </g>
      <path d="M70 170 q20 18 40 0 M160 170 q20 18 40 0 M255 170 q20 18 40 0 M350 170 q20 18 40 0"
            fill="none" stroke="#E0A89F" stroke-width="1.6"/>
    </svg>
    <p class="cap">등차는 <b>일정하게 더하고(+d)</b>, 등비는 <b>일정하게 곱한다(×r)</b></p>
  </div>

  <div class="twocard">
    <div class="pcard">
      <h3>등차수열</h3>
      <ul>
        <li>일반항 <span class="blue">a<sub>n</sub> = a + (n−1)d</span></li>
        <li>합 <span class="blue">S<sub>n</sub> = n(a<sub>1</sub>+a<sub>n</sub>) / 2</span></li>
        <li>= n{2a + (n−1)d} / 2</li>
        <li>중항: 2b = a + c</li>
      </ul>
    </div>
    <div class="pcard">
      <h3>등비수열</h3>
      <ul>
        <li>일반항 <span class="red">a<sub>n</sub> = a · r<sup>n−1</sup></span></li>
        <li>합 <span class="red">S<sub>n</sub> = a(r<sup>n</sup>−1)/(r−1)</span> (r≠1)</li>
        <li>r=1 이면 S<sub>n</sub> = na</li>
        <li>중항: b² = a · c</li>
      </ul>
    </div>
  </div>

  <div class="formula">
    <h3>시그마 ∑ 공식</h3>
    <ul>
      <li><span class="blue">∑<sub>k=1</sub><sup>n</sup> k = n(n+1)/2</span></li>
      <li><span class="blue">∑<sub>k=1</sub><sup>n</sup> k² = n(n+1)(2n+1)/6</span></li>
      <li><span class="blue">∑<sub>k=1</sub><sup>n</sup> k³ = {n(n+1)/2}²</span></li>
      <li>∑(c) = cn &nbsp;·&nbsp; ∑(a<sub>k</sub> ± b<sub>k</sub>) = ∑a<sub>k</sub> ± ∑b<sub>k</sub> &nbsp;·&nbsp; ∑(c·a<sub>k</sub>) = c∑a<sub>k</sub></li>
    </ul>
  </div>

  <h2>이것만은 — 시험 함정</h2>
  <ul class="rules">
    <li><span class="hl">일반항 지수는 n−1</span> (n 아님).
      <small>등차 a+<span class="o">(n−1)</span>d, 등비 a·r<sup><span class="o">n−1</span></sup>. 첫째항이 n=1일 때 a가 되려면 (n−1)이라야 맞아요.</small></li>
    <li><span class="hl">∑ 의 상수는 그냥 곱이 아니다</span> — <span class="o">∑<sub>k=1</sub><sup>n</sup> c = cn</span>.
      <small>∑(5) = 5n (n번 더하니까). <span class="x">∑c ≠ c</span> 주의.</small></li>
    <li>∑ 는 <span class="o">덧셈·상수배</span>만 쪼갤 수 있다.
      <small>∑(a<sub>k</sub>+b<sub>k</sub>)=∑a<sub>k</sub>+∑b<sub>k</sub> 는 OK. <span class="x">∑(a<sub>k</sub>·b<sub>k</sub>) ≠ ∑a<sub>k</sub>·∑b<sub>k</sub></span> (곱은 안 됨!)</small></li>
    <li>등비수열 합은 <span class="hl">r=1 인지 먼저 확인</span>.
      <small>공식 a(r<sup>n</sup>−1)/(r−1)은 r≠1에서만. r=1이면 분모 0이라 따로 S<sub>n</sub>=na.</small></li>
    <li>합과 일반항의 관계: <span class="o">a<sub>n</sub> = S<sub>n</sub> − S<sub>n−1</sub></span> (n≥2).
      <small>단 <span class="x">a<sub>1</sub> = S<sub>1</sub></span> 은 따로! n=1은 위 식이 성립 안 할 수 있어요.</small></li>
  </ul>

  <h2>수열 퀴즈</h2>
  <div class="quiz">
    <div class="qtop"><span>맞춤 <b id="sc">0</b></span><span>푼 문제 <b id="tot">0</b></span></div>
    <div class="qnum" id="num">—</div>
    <p class="qask" id="ask">값 또는 식을 고르세요</p>
    <div class="choices" id="ch"></div>
    <div class="fb" id="fb"></div>
    <button class="next" id="next">다음 →</button>
  </div>

  <p class="foot">한 장으로 외우는 수열 ✏️</p>
</div>

<script>
const QUIZ=[
  {n:"등차수열 일반항 aₙ = ?", o:['a+(n−1)d','a+nd','a·rⁿ⁻¹'], a:'a+(n−1)d', e:"첫째항 a에 공차 d를 (n−1)번 더함."},
  {n:"등비수열 일반항 aₙ = ?", o:['a·rⁿ⁻¹','a+(n−1)r','a·rⁿ'], a:'a·rⁿ⁻¹', e:"첫째항 a에 공비 r을 (n−1)번 곱함."},
  {n:"2,5,8,11… 의 공차 d", o:['3','2','5'], a:'3', e:"뒷항−앞항 = 3."},
  {n:"3,6,12,24… 의 공비 r", o:['2','3','6'], a:'2', e:"뒷항÷앞항 = 2."},
  {n:"등차 2,5,8… 의 제5항", o:['14','11','17'], a:'14', e:"2+(5−1)·3 = 14."},
  {n:"등비 3,6,12… 의 제4항", o:['24','18','48'], a:'24', e:"3·2³ = 24."},
  {n:"∑(k=1~n) k = ?", o:['n(n+1)/2','n²','n(n+1)'], a:'n(n+1)/2', e:"1+2+…+n 공식."},
  {n:"∑(k=1~10) k = ?", o:['55','50','100'], a:'55', e:"10·11/2 = 55."},
  {n:"∑(k=1~n) k² = ?", o:['n(n+1)(2n+1)/6','{n(n+1)/2}²','n(n+1)/2'], a:'n(n+1)(2n+1)/6', e:"제곱의 합 공식."},
  {n:"∑(k=1~5) 3 = ?", o:['15','3','8'], a:'15', e:"상수 3을 5번 더함: 3·5=15."},
  {n:"∑(aₖ+bₖ) 는?", o:['∑aₖ+∑bₖ','∑aₖ·∑bₖ','∑aₖ−∑bₖ'], a:'∑aₖ+∑bₖ', e:"덧셈은 쪼갤 수 있음."},
  {n:"등비 합 공식 쓸 때 확인할 것", o:['r=1 인지','d=0 인지','n>0 인지'], a:'r=1 인지', e:"r=1이면 분모 0 → Sₙ=na."},
  {n:"aₙ = Sₙ − ? (n≥2)", o:['Sₙ₋₁','Sₙ₊₁','S₁'], a:'Sₙ₋₁', e:"합의 차로 일반항. 단 a₁=S₁."},
  {n:"등차중항: 2b = ?", o:['a+c','a·c','a−c'], a:'a+c', e:"세 수 a,b,c 등차면 2b=a+c."}
];
let order=[],i=0,sc=0,tot=0;
const num=document.getElementById('num'),ch=document.getElementById('ch'),fb=document.getElementById('fb'),
  next=document.getElementById('next'),scEl=document.getElementById('sc'),totEl=document.getElementById('tot');
const shuffle=a=>{a=a.slice();for(let k=a.length-1;k>0;k--){const j=Math.random()*(k+1)|0;[a[k],a[j]]=[a[j],a[k]];}return a;};
function load(){
  if(i>=order.length){order=shuffle(QUIZ);i=0;}
  const q=order[i]; num.textContent=q.n; fb.textContent=''; fb.className='fb';
  next.classList.remove('show'); ch.innerHTML='';
  shuffle(q.o).forEach(o=>{const b=document.createElement('button');b.className='choice';b.textContent=o;
    b.onclick=()=>answer(b,o,q);ch.appendChild(b);});
}
function answer(btn,choice,q){
  [...ch.children].forEach(c=>{c.disabled=true;if(c.textContent===q.a)c.classList.add('ok');});
  tot++;
  if(choice===q.a){sc++;fb.innerHTML='정답!';fb.className='fb ok';}
  else{btn.classList.add('no');fb.innerHTML='아쉬워요';fb.className='fb no';}
  fb.innerHTML+=`<small>${q.a} · ${q.e}</small>`;
  scEl.textContent=sc; totEl.textContent=tot; next.classList.add('show');
}
next.onclick=()=>{i++;load();};
order=shuffle(QUIZ); load();
<\/script>
</body>
</html>

  </script>

<body>
<div class="wrap">
  <header>
    <div class="kicker">수능 개념노트 · 수학Ⅰ</div>
    <h1>삼각함수</h1>
    <p class="sub">호도법 · 삼각비 · 그래프 · 사인·코사인법칙</p>
  </header>

  <div class="sheet">
    <svg viewBox="0 0 760 300" role="img" aria-labelledby="tt td">
      <title id="tt">단위원과 사인·코사인 그래프</title>
      <desc id="td">단위원 위의 점의 x좌표가 코사인, y좌표가 사인이다. 사인 그래프는 0에서 시작해 물결치고, 코사인 그래프는 1에서 시작한다.</desc>
      <!-- 단위원 -->
      <g transform="translate(120,150)">
        <circle cx="0" cy="0" r="95" fill="none" stroke="#C9Bfa6" stroke-width="1.6"/>
        <line x1="-115" y1="0" x2="115" y2="0" stroke="#C9Bfa6" stroke-width="1.4"/>
        <line x1="0" y1="-115" x2="0" y2="115" stroke="#C9Bfa6" stroke-width="1.4"/>
        <line x1="0" y1="0" x2="67" y2="-67" stroke="#33312C" stroke-width="2.2"/>
        <line x1="67" y1="-67" x2="67" y2="0" stroke="#C0392B" stroke-width="2" stroke-dasharray="4 3"/>
        <line x1="0" y1="0" x2="67" y2="0" stroke="#2E5C9A" stroke-width="2"/>
        <circle cx="67" cy="-67" r="4" fill="#33312C"/>
        <text x="30" y="-20" font-family="'Nanum Pen Script'" font-size="20">θ</text>
        <text x="72" y="-30" font-family="'Nanum Pen Script'" font-size="17" fill="#C0392B">sin</text>
        <text x="20" y="18" font-family="'Nanum Pen Script'" font-size="17" fill="#2E5C9A">cos</text>
        <text x="-110" y="-100" font-family="'Nanum Pen Script'" font-size="18" fill="#6B675C">단위원 r=1</text>
      </g>
      <!-- sin / cos 그래프 -->
      <g transform="translate(300,150)">
        <line x1="0" y1="0" x2="420" y2="0" stroke="#C9Bfa6" stroke-width="1.4"/>
        <path d="M0 0 Q45 -70 90 0 T180 0 T270 0 T360 0" fill="none" stroke="#C0392B" stroke-width="2.5"/>
        <path d="M0 -70 Q45 0 90 70 Q135 0 180 -70 Q225 0 270 70 Q315 0 360 -70" fill="none" stroke="#2E5C9A" stroke-width="2.5"/>
        <text x="370" y="-55" font-family="'Nanum Pen Script'" font-size="20" fill="#C0392B">y=sin x</text>
        <text x="370" y="-15" font-family="'Nanum Pen Script'" font-size="20" fill="#2E5C9A">y=cos x</text>
      </g>
    </svg>
    <p class="cap">단위원: x좌표 = <span class="blue">cos θ</span>, y좌표 = <span class="red">sin θ</span> · 주기 <b>2π</b></p>
  </div>

  <div class="formula">
    <h3>기본 관계 · 호도법</h3>
    <ul>
      <li>호도법: <span class="blue">180° = π (라디안)</span> &nbsp;·&nbsp; 360° = 2π</li>
      <li><span class="blue">sin²θ + cos²θ = 1</span> &nbsp;·&nbsp; tan θ = sin θ / cos θ</li>
      <li>부채꼴(반지름 r, 중심각 θ): 호 길이 <span class="blue">l = rθ</span>, 넓이 <span class="blue">S = ½r²θ = ½rl</span></li>
    </ul>
  </div>

  <table class="tbl">
    <tr><th>θ</th><th>0</th><th>30°(π/6)</th><th>45°(π/4)</th><th>60°(π/3)</th><th>90°(π/2)</th></tr>
    <tr><td class="lab">sin</td><td>0</td><td>1/2</td><td>√2/2</td><td>√3/2</td><td>1</td></tr>
    <tr><td class="lab">cos</td><td>1</td><td>√3/2</td><td>√2/2</td><td>1/2</td><td>0</td></tr>
    <tr><td class="lab">tan</td><td>0</td><td>√3/3</td><td>1</td><td>√3</td><td>—</td></tr>
  </table>

  <div class="formula" style="margin-bottom:24px;">
    <h3>삼각형에서 (사인·코사인법칙)</h3>
    <ul>
      <li>사인법칙: <span class="blue">a/sin A = b/sin B = c/sin C = 2R</span> (R=외접원 반지름)</li>
      <li>코사인법칙: <span class="blue">a² = b² + c² − 2bc·cos A</span></li>
      <li>삼각형 넓이: <span class="blue">S = ½·b·c·sin A</span></li>
    </ul>
  </div>

  <h2>이것만은 — 시험 함정</h2>
  <ul class="rules">
    <li><span class="hl">각은 라디안(호도법)으로</span> — 180° = π.
      <small>미적분·그래프에선 도(°)가 아니라 <span class="o">π 단위</span>로 씁니다. 30°=π/6, 90°=π/2.</small></li>
    <li>sin²θ + cos²θ = 1 에서 <span class="hl">sin²θ 는 (sin θ)²</span>.
      <small><span class="x">sin θ² (= sin(θ²)) 과 다름!</span> 제곱은 함숫값에 붙어요.</small></li>
    <li>부채꼴 공식은 <span class="o">θ가 라디안</span>일 때만 — l = rθ, S = ½r²θ.
      <small>도(°)를 그대로 넣으면 틀려요. 먼저 라디안으로 바꾸기.</small></li>
    <li>sin·cos 는 <span class="hl">−1 이상 1 이하</span> (범위 넘는 값은 불가).
      <small>치역 [−1, 1]. 주기 2π. tan 은 주기 π이고 치역은 실수 전체.</small></li>
    <li>y=sin(bx) 처럼 <span class="o">bx면 주기가 2π/|b|</span>.
      <small>y=a·sin(bx) 는 진폭 |a|, 주기 2π/|b|. b가 크면 촘촘해져요.</small></li>
  </ul>

  <h2>삼각함수 퀴즈</h2>
  <div class="quiz">

      <desc id="dd">곡선 위 두 점을 잇는 직선(평균변화율)에서 두 점이 한없이 가까워지면 접선이 되고, 그 접선의 기울기가 미분계수 f'(a)이다.</desc>

    <li>평균변화율 ≠ 미분계수.

  </ul>

  <div class="sheet">

      <g stroke="#C9Bfa6" stroke-width="1.5"><line x1="40" y1="250" x2="520" y2="250"/></g>

      <text x="360" y="272" font-family="'Nanum Pen Script'" font-size="22" fill="#C0392B">극소</text>

      <!-- 증가/감소 화살표 -->
      <text x="95" y="175" font-family="'Nanum Pen Script'" font-size="20" fill="#2E5C9A">증가 ↗</text>
      <text x="285" y="165" font-family="'Nanum Pen Script'" font-size="20" fill="#C0392B">감소 ↘</text>

    <p class="cap"><b>도함수 f '(x)의 부호</b>가 함수의 증가·감소를 결정 · 부호가 바뀌는 곳이 <b>극값</b></p>

  <table class="tbl">
    <tr><th>x</th><th>…</th><th>−1</th><th>…</th><th>1</th><th>…</th></tr>

    <tr><td class="lab">f(x)</td><td class="up">↗</td><td>극대</td><td class="down">↘</td><td>극소</td><td class="up">↗</td></tr>
  </table>

  <h2>이것만은 — 시험 함정</h2>
  <ul class="rules">
    <li><span class="hl">f '(x)=0 이라고 무조건 극값은 아니다</span>.
      <small>부호가 <span class="o">실제로 바뀌어야</span> 극값. 예: y=x³ 은 x=0에서 f '=0이지만 +→+ 라 극값 아님(변곡점).</small></li>
    <li>극대 &gt; 극소가 항상 성립하는 건 아니다.
      <small>극대는 "주변에서 가장 큼", 극소는 "주변에서 가장 작음"일 뿐 — <span class="x">극솟값이 극댓값보다 클 수도</span> 있어요.</small></li>
    <li><span class="hl">극값 ≠ 최댓값/최솟값</span>.
      <small>닫힌구간 [a,b]의 최대·최소는 <span class="o">극값 후보 + 양 끝점 f(a), f(b)</span> 까지 모두 비교해서 정함.</small></li>
    <li>증가·감소는 <span class="o">구간</span>으로 답한다.
      <small>"증가하는 구간"을 물으면 f '(x)&gt;0 인 x의 범위로 답. 한 점이 아니라 구간.</small></li>

  </ul>

<script>
const QUIZ=[
  {n:"f '(x)>0 인 구간에서 함수는?", o:['증가','감소','일정'], a:'증가', e:"도함수 양수 → 증가 ↗."},
  {n:"f '(x)<0 인 구간에서 함수는?", o:['증가','감소','극대'], a:'감소', e:"도함수 음수 → 감소 ↘."},
  {n:"f '(x): + → − 로 바뀌는 점은?", o:['극대','극소','변곡점'], a:'극대', e:"올라가다 내려감 → 극대."},
  {n:"f '(x): − → + 로 바뀌는 점은?", o:['극대','극소','최대'], a:'극소', e:"내려가다 올라감 → 극소."},
  {n:"f(x)=x³ 의 x=0 은?", o:['극대','극소','극값 아님'], a:'극값 아님', e:"f '=0이지만 부호 안 바뀜(+→+)."},
  {n:"f(x)=x²−2x, f '(x)=0 인 x", o:['1','2','0'], a:'1', e:"f '=2x−2=0 → x=1 (극소)."},
  {n:"f(x)=x²−2x 는 x=1 에서?", o:['극대','극소','변곡점'], a:'극소', e:"아래로 볼록, x=1에서 극소."},
  {n:"닫힌구간 최댓값 구할 때 꼭 볼 것", o:['양 끝점도','극값만','도함수만'], a:'양 끝점도', e:"극값 후보 + 양 끝점 f(a),f(b) 비교."},
  {n:"극값과 최댓값의 관계는?", o:['항상 같다','다를 수 있다','극값이 늘 큼'], a:'다를 수 있다', e:"극값은 국소적, 최대는 전체 비교."},
  {n:"f(x)=x³−3x 의 극대점 x", o:['−1','1','0'], a:'−1', e:"f '=3x²−3, x=−1에서 +→− (극대)."},
  {n:"f(x)=x³−3x 의 극소점 x", o:['−1','1','3'], a:'1', e:"x=1에서 −→+ (극소)."},
  {n:"'증가하는 구간'의 답 형태는?", o:['구간(범위)','한 점','기울기'], a:'구간(범위)', e:"f '>0 인 x의 범위로 답."},
  {n:"삼차함수의 극값 개수(최대)", o:['0개','2개','4개'], a:'2개', e:"극대 1 + 극소 1 = 최대 2개."},
  {n:"접선이 수평인 곳은 f '(x)가?", o:['0','양수','음수'], a:'0', e:"수평 접선 → 기울기 0 → f '=0."}
];
let order=[],i=0,sc=0,tot=0;
const num=document.getElementById('num'),ch=document.getElementById('ch'),fb=document.getElementById('fb'),
  next=document.getElementById('next'),scEl=document.getElementById('sc'),totEl=document.getElementById('tot');
const shuffle=a=>{a=a.slice();for(let k=a.length-1;k>0;k--){const j=Math.random()*(k+1)|0;[a[k],a[j]]=[a[j],a[k]];}return a;};
function load(){
  if(i>=order.length){order=shuffle(QUIZ);i=0;}
  const q=order[i]; num.textContent=q.n; fb.textContent=''; fb.className='fb';
  next.classList.remove('show'); ch.innerHTML='';
  shuffle(q.o).forEach(o=>{const b=document.createElement('button');b.className='choice';b.textContent=o;
    b.onclick=()=>answer(b,o,q);ch.appendChild(b);});
}
function answer(btn,choice,q){
  [...ch.children].forEach(c=>{c.disabled=true;if(c.textContent===q.a)c.classList.add('ok');});
  tot++;
  if(choice===q.a){sc++;fb.innerHTML='정답!';fb.className='fb ok';}
  else{btn.classList.add('no');fb.innerHTML='아쉬워요';fb.className='fb no';}
  fb.innerHTML+=`<small>${q.a} · ${q.e}</small>`;
  scEl.textContent=sc; totEl.textContent=tot; next.classList.add('show');
}
next.onclick=()=>{i++;load();};
order=shuffle(QUIZ); load();
<\/script>
</body>

      <!-- 곡선 -->
      <path d="M80 210 Q200 120 300 150 Q380 175 440 90" fill="none" stroke="#33312C" stroke-width="2.5"/>
      <text x="410" y="80" font-family="'Nanum Pen Script'" font-size="22">y=f(x)</text>
      <!-- 넓이 영역 (a=150 ~ b=360) -->
      <path d="M150 240 L150 162 Q230 132 300 150 Q340 160 360 167 L360 240 Z" fill="#Bcd0ea" fill-opacity="0.55" stroke="none"/>
      <line x1="150" y1="240" x2="150" y2="160" stroke="#2E5C9A" stroke-width="1.6" stroke-dasharray="4 4"/>
      <line x1="360" y1="240" x2="360" y2="167" stroke="#2E5C9A" stroke-width="1.6" stroke-dasharray="4 4"/>
      <text x="143" y="258" font-family="'Nanum Pen Script'" font-size="20" fill="#2E5C9A">a</text>
      <text x="353" y="258" font-family="'Nanum Pen Script'" font-size="20" fill="#2E5C9A">b</text>
      <text x="225" y="205" font-family="'Nanum Pen Script'" font-size="22" fill="#2E5C9A">넓이 S</text>
      <!-- 오른쪽 식 -->
      <g font-family="'Nanum Pen Script'" font-size="22" fill="#33312C">
        <text x="500" y="120">S = ∫<tspan font-size="15" dy="6">a</tspan><tspan font-size="15" dy="-22">b</tspan><tspan dy="16"> f(x) dx</tspan></text>
        <text x="500" y="170" fill="#2E5C9A">= F(b) − F(a)</text>
        <text x="500" y="210" font-size="17" fill="#6B675C">(F는 f의 부정적분)</text>
      </g>
    </svg>
    <p class="cap">f(x) ≥ 0 이면 <b>정적분 = 곡선 아래 넓이</b> · 계산은 <b>F(b) − F(a)</b></p>
  </div>

  <div class="formula">
    부정적분 &nbsp; <b>∫ x<sup>n</sup> dx = x<sup>n+1</sup> / (n+1) + C</b> &nbsp;(n ≠ −1)
    <ul>
      <li>F '(x)=f(x) ⟺ <span class="blue">∫ f(x) dx = F(x) + C</span> (적분상수 C 꼭!)</li>
      <li>∫ k dx = kx + C &nbsp;·&nbsp; ∫ x dx = x²/2 + C &nbsp;·&nbsp; ∫ x² dx = x³/3 + C</li>
    </ul>
  </div>
  <div class="formula" style="margin-bottom:24px;">
    정적분 &nbsp; <b>∫<sub>a</sub><sup>b</sup> f(x) dx = F(b) − F(a)</b> &nbsp;(미적분의 기본정리)
    <ul>
      <li><span class="blue">∫<sub>a</sub><sup>a</sup> f dx = 0</span> &nbsp;·&nbsp; <span class="blue">∫<sub>a</sub><sup>b</sup> f dx = − ∫<sub>b</sub><sup>a</sup> f dx</span></li>
      <li>∫<sub>a</sub><sup>b</sup> + ∫<sub>b</sub><sup>c</sup> = ∫<sub>a</sub><sup>c</sup> (구간 이어붙이기)</li>
      <li>두 곡선 사이 넓이 = <span class="blue">∫ (위 − 아래) dx</span></li>
    </ul>
  </div>

  <h2>이것만은 — 시험 함정</h2>
  <ul class="rules">
    <li><span class="hl">부정적분엔 +C, 정적분엔 C 없음</span>.
      <small>부정적분은 함수(+C 필수). 정적분 F(b)−F(a)는 <span class="o">숫자</span>라 C가 사라져요.</small></li>
    <li><span class="hl">정적분 값 ≠ 넓이일 수 있다</span>.
      <small>f(x)&lt;0 인 구간은 정적분이 <span class="x">음수</span>. 넓이는 ∫|f| 또는 x축 위·아래로 <span class="o">구간을 나눠</span> 계산.</small></li>
    <li>∫ x<sup>n</sup> dx = x<sup>n+1</sup>/(n+1)+C 는 <span class="o">n ≠ −1</span>에서만.
      <small>지수에 1 더하고 그 수로 나누기. 미분의 정반대.</small></li>
    <li>정적분은 <span class="o">위끝 − 아래끝</span> 순서 — F(b) − F(a).
      <small>순서 바꾸면 부호가 반대가 돼요: ∫<sub>a</sub><sup>b</sup> = −∫<sub>b</sub><sup>a</sup>.</small></li>
    <li>두 곡선 사이 넓이는 <span class="hl">위 함수 − 아래 함수</span>.
      <small>먼저 <span class="o">교점</span>을 구해 적분 구간을 정하고, 구간에서 누가 위인지 확인.</small></li>
  </ul>

  <h2>적분 퀴즈</h2>
  <div class="quiz">
    <div class="qtop"><span>맞춤 <b id="sc">0</b></span><span>푼 문제 <b id="tot">0</b></span></div>

  </div>

  <p class="foot">한 장으로 외우는 적분 ✏️</p>
</div>

<script>
const QUIZ=[
  {n:"∫ x² dx = ?", o:['x³/3 + C','3x² + C','x³ + C'], a:'x³/3 + C', e:"지수+1 하고 그 수로 나눔: x³/3 +C."},
  {n:"∫ x dx = ?", o:['x²/2 + C','x² + C','1 + C'], a:'x²/2 + C', e:"x¹⁺¹/2 = x²/2 +C."},
  {n:"∫ 3 dx = ?", o:['3x + C','3 + C','0'], a:'3x + C', e:"상수 k의 적분은 kx +C."},
  {n:"부정적분에 꼭 붙는 것", o:['+C','넓이','0'], a:'+C', e:"적분상수 C를 빠뜨리면 안 됨."},
  {n:"∫ₐᵃ f(x) dx = ?", o:['0','f(a)','F(a)'], a:'0', e:"위끝=아래끝이면 0."},
  {n:"∫ₐᵇ f dx = F(b) − ?", o:['F(a)','F(b)','f(a)'], a:'F(a)', e:"기본정리: 위끝−아래끝."},
  {n:"∫₀¹ x dx = ?", o:['1/2','1','2'], a:'1/2', e:"[x²/2]₀¹ = 1/2 − 0."},
  {n:"∫₀² x dx = ?", o:['2','4','1'], a:'2', e:"[x²/2]₀² = 2."},
  {n:"∫₀¹ x² dx = ?", o:['1/3','1','1/2'], a:'1/3', e:"[x³/3]₀¹ = 1/3."},
  {n:"f(x)<0 이면 정적분 값은?", o:['음수','양수','0'], a:'음수', e:"x축 아래면 정적분이 음수."},
  {n:"정적분 ∫ₐᵇ 의 부호 바꾸면?", o:['∫ᵇₐ','∫ₐᵇ 그대로','0'], a:'∫ᵇₐ', e:"∫ₐᵇ = −∫ᵇₐ."},
  {n:"두 곡선 사이 넓이 = ∫(?)dx", o:['위−아래','아래−위','위+아래'], a:'위−아래', e:"항상 위 함수에서 아래 함수를 뺌."},
  {n:"넓이 적분 전에 먼저 구할 것", o:['교점','극값','점근선'], a:'교점', e:"교점으로 적분 구간을 정함."},
  {n:"∫ x³ dx = ?", o:['x⁴/4 + C','4x³ + C','x⁴ + C'], a:'x⁴/4 + C', e:"x³⁺¹/4 = x⁴/4 +C."}
];
let order=[],i=0,sc=0,tot=0;
const num=document.getElementById('num'),ch=document.getElementById('ch'),fb=document.getElementById('fb'),
  next=document.getElementById('next'),scEl=document.getElementById('sc'),totEl=document.getElementById('tot');
const shuffle=a=>{a=a.slice();for(let k=a.length-1;k>0;k--){const j=Math.random()*(k+1)|0;[a[k],a[j]]=[a[j],a[k]];}return a;};
function load(){
  if(i>=order.length){order=shuffle(QUIZ);i=0;}
  const q=order[i]; num.textContent=q.n; fb.textContent=''; fb.className='fb';
  next.classList.remove('show'); ch.innerHTML='';
  shuffle(q.o).forEach(o=>{const b=document.createElement('button');b.className='choice';b.textContent=o;
    b.onclick=()=>answer(b,o,q);ch.appendChild(b);});
}
function answer(btn,choice,q){
  [...ch.children].forEach(c=>{c.disabled=true;if(c.textContent===q.a)c.classList.add('ok');});

  fb.innerHTML+=`<small>${q.a} · ${q.e}</small>`;
  scEl.textContent=sc; totEl.textContent=tot; next.classList.add('show');
}
next.onclick=()=>{i++;load();};
order=shuffle(QUIZ); load();

<script>

  {n:'0',a:'유리수',e:'0은 정수이자 유리수.'},
  {n:'√4',a:'유리수',e:'√4 = 2, 함정! 자연수.'},

  const q=order[i]; num.textContent=q.n; fb.textContent=''; fb.className='fb';
  next.classList.remove('show'); ch.innerHTML='';
  OPTS.forEach(o=>{const b=document.createElement('button');b.className='choice';b.textContent=o;
    b.onclick=()=>answer(b,o,q);ch.appendChild(b);});
}
function answer(btn,choice,q){
  [...ch.children].forEach(c=>{c.disabled=true;if(c.textContent===q.a)c.classList.add('ok');});
  tot++;
  if(choice===q.a){sc++;fb.innerHTML='정답!';fb.className='fb ok';}
  else{btn.classList.add('no');fb.innerHTML='아쉬워요';fb.className='fb no';}
  fb.innerHTML+=`<small>${q.n} → ${q.a} · ${q.e}</small>`;
  scEl.textContent=sc; totEl.textContent=tot; next.classList.add('show');
}
next.onclick=()=>{i++;load();};
order=shuffle(QUIZ); load();
<\/script>
</body>
