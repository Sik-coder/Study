<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>수학 개념노트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1E2330; --muted:#6B7280; --faint:#9AA1AD;
    --paper:#FFFFFF; --bg:#F6F7FB;
    --pen:#2F4B9A; --pen-dark:#23397A; --pen-soft:#E9EDF8;
    --amber:#C77A1E; --amber-soft:#FBF1E0;
    --green:#1C8F6B; --line:#E3E7EF;
    --shadow:0 16px 36px -22px rgba(30,40,70,.4);
    --eng:'Space Grotesk', system-ui, sans-serif;
    --kor:'Noto Sans KR', system-ui, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{font-family:var(--kor); color:var(--ink); background:var(--bg);
    -webkit-font-smoothing:antialiased}
  .screen{min-height:100dvh; display:flex; flex-direction:column}
  .screen[hidden]{display:none}
  .wrap{width:100%; max-width:560px; margin:0 auto; padding:26px 20px 48px}

  .topbar{display:flex; align-items:center; gap:10px; margin-bottom:22px}
  .topbar a, .topbar button{font:inherit; cursor:pointer; text-decoration:none; font-size:13px; font-weight:700;
    color:var(--pen); background:var(--pen-soft); border:none; padding:8px 14px; border-radius:99px; white-space:nowrap}
  .topbar .sp{margin-left:auto}

  .head{display:flex; align-items:center; gap:13px; margin-bottom:8px}
  .mark{width:46px; height:46px; flex:none; background:var(--paper); border:1px solid var(--line);
    border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:24px; box-shadow:var(--shadow)}
  .head h1{font-size:21px; font-weight:900; letter-spacing:-.01em}
  .head p{font-size:12.5px; color:var(--muted); margin-top:2px}

  .list{display:flex; flex-direction:column; gap:13px; margin-top:22px}
  .note{display:flex; align-items:center; gap:14px; width:100%; text-align:left; cursor:pointer;
    background:var(--paper); border:1px solid var(--line); border-radius:18px; padding:17px;
    box-shadow:var(--shadow); transition:transform .12s ease}
  .note:active{transform:scale(.985)}
  .note .ic{width:50px; height:50px; flex:none; border-radius:13px; background:var(--pen-soft);
    color:var(--pen-dark); display:flex; align-items:center; justify-content:center; font-size:25px}
  .note .tx{flex:1}
  .note .tx h2{font-size:16.5px; font-weight:800}
  .note .tx p{font-size:12.5px; color:var(--muted); margin-top:2px; font-weight:500}
  .note .go{font-family:var(--eng); font-weight:700; font-size:19px; color:var(--pen); flex:none}
  .note .tag{display:inline-block; font-family:var(--eng); font-size:10px; font-weight:700; letter-spacing:.08em;
    color:var(--amber); background:var(--amber-soft); padding:2px 7px; border-radius:99px; margin-bottom:4px}
  .empty{text-align:center; color:var(--faint); font-size:13px; padding:30px 0}
  .foot{text-align:center; font-size:12px; color:var(--faint); margin-top:26px; line-height:1.7}

  /* detail */
  #detailView{padding:0}
  .dbar{display:flex; align-items:center; gap:10px; padding:12px 16px; background:var(--bg);
    border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5}
  .dbar button, .dbar a{font:inherit; cursor:pointer; text-decoration:none; font-size:13px; font-weight:700;
    color:var(--pen); background:var(--pen-soft); border:none; padding:8px 14px; border-radius:99px; white-space:nowrap}
  .dbar .sp{margin-left:auto}
  .dbar .ttl{font-weight:800; font-size:14px; color:var(--ink)}
  #viewer{flex:1; width:100%; border:none; background:#FBF6EA}
</style>
</head>
<body>

  <div class="screen" id="listView">
    <div class="wrap">
      <div class="topbar">
        <a href="math.html">← 수학 문제</a>
        <a href="index.html" class="sp">↔ 과목</a>
      </div>
      <div class="head">
        <span class="mark">📝</span>
        <div>
          <h1>수학 개념노트</h1>
          <p>한 장으로 외우는 핵심 개념 모음</p>
        </div>
      </div>
      <div class="list" id="list"></div>
      <div class="foot">노트는 계속 추가될 예정이에요 ✏️</div>
    </div>
  </div>

  <div class="screen" id="detailView" hidden>
    <div class="dbar">
      <button id="backBtn">← 목록</button>
      <span class="ttl" id="dTitle"></span>
      <a href="index.html" class="sp">↔ 과목</a>
    </div>
    <iframe id="viewer" title="개념노트"></iframe>
  </div>

  <!-- ===== 임베디드된 개념노트 (각 노트는 완전 격리) ===== -->
  <script type="text/html" id="note_number-system">
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수 체계 개념노트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF6EA; --ink:#33312C; --ink2:#6B675C;
    --blue:#2E5C9A; --red:#C0392B; --hl:rgba(255,214,64,.55);
    --line:#E4DDC9; --card:#FFFDF7;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:"Gaegu",system-ui,sans-serif; line-height:1.55;
    background-image:linear-gradient(90deg,transparent 38px,#EBC9C0 38px,#EBC9C0 40px,transparent 40px);
  }
  @media(max-width:560px){body{background-image:none;}}
  .wrap{max-width:760px; margin:0 auto; padding:0 26px 60px 52px;}
  @media(max-width:560px){.wrap{padding:0 20px 50px;}}

  header{padding:30px 0 6px;}
  .kicker{font-family:"Nanum Pen Script"; font-size:22px; color:var(--ink2); letter-spacing:.04em;}
  h1{font-family:"Nanum Pen Script"; font-size:48px; font-weight:400; margin:0; line-height:1.05;}
  .sub{font-size:17px; color:var(--ink2); margin:2px 0 0;}

  .sheet{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px 10px 18px; margin:22px 0 28px; box-shadow:0 2px 0 #ECE3CE;}
  svg{width:100%; height:auto; display:block;}

  h2{font-family:"Nanum Pen Script"; font-size:30px; font-weight:400; margin:30px 0 12px;}
  .rules{list-style:none; padding:0; margin:0; display:grid; gap:14px;}
  .rules li{font-size:19px; line-height:1.5;}
  .hl{background:linear-gradient(var(--hl),var(--hl)); background-size:100% 62%;
    background-repeat:no-repeat; background-position:0 72%; padding:0 3px; font-weight:700;}
  .x{color:var(--red); font-weight:700;}
  .o{color:var(--blue); font-weight:700;}
  .rules small{display:block; font-size:15.5px; color:var(--ink2);}

  /* quiz */
  .quiz{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:20px 18px 22px; box-shadow:0 2px 0 #ECE3CE; text-align:center;}
  .qtop{display:flex; justify-content:space-between; font-size:16px; color:var(--ink2); margin-bottom:8px;}
  .qtop b{color:var(--ink); font-family:"Nanum Pen Script"; font-size:22px;}
  .qnum{font-family:"Nanum Pen Script"; font-size:64px; line-height:1; margin:6px 0 2px;}
  .qask{font-size:17px; color:var(--ink2); margin:0 0 16px;}
  .choices{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}
  .choice{font-family:"Gaegu"; font-weight:700; font-size:19px; color:var(--ink);
    background:var(--paper); border:2px solid var(--line); border-radius:12px; padding:12px 4px;
    cursor:pointer; transition:.14s;}
  .choice:hover:not(:disabled){border-color:var(--ink2);}
  .choice:disabled{cursor:default;}
  .choice.ok{background:#E7F1E0; border-color:#5E9A4E; color:#3C6B30;}
  .choice.no{background:#FBE7E3; border-color:var(--red); color:var(--red);}
  .fb{min-height:22px; margin-top:14px; font-size:18px; font-weight:700;}
  .fb.ok{color:#5E9A4E;} .fb.no{color:var(--red);}
  .fb small{display:block; font-weight:400; font-size:15.5px; color:var(--ink2); margin-top:3px;}
  .next{margin-top:14px; font-family:"Gaegu"; font-weight:700; font-size:18px; color:var(--paper);
    background:var(--ink); border:none; border-radius:12px; padding:10px 26px; cursor:pointer;
    opacity:0; pointer-events:none; transition:.18s;}
  .next.show{opacity:1; pointer-events:auto;}
  button:focus-visible{outline:2px solid var(--blue); outline-offset:2px;}

  .foot{font-family:"Nanum Pen Script"; font-size:20px; color:var(--ink2); text-align:center; margin-top:34px;}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">수능 개념노트</div>
    <h1>수 체계</h1>
    <p class="sub">복소수를 한눈에 — 가지치기 한 장으로</p>
  </header>

  <div class="sheet">
    <svg viewBox="0 0 840 470" role="img" aria-labelledby="svgttl svgdesc">
      <title id="svgttl">복소수 분류 가지치기</title>
      <desc id="svgdesc">복소수는 실수와 허수로 나뉜다. 실수는 수직선에 나타낼 수 있고, 유리수는 분수 꼴로 쓸 수 있으며, 무리수는 분수로 표현할 수 없다. 허수는 수직선에 나타낼 수 없어 대소 비교가 불가능하다.</desc>
      <g fill="none" stroke="#33312C" stroke-width="2" stroke-linecap="round">
        <path d="M65 314 H120 M120 231 V396 M120 231 H148 M120 396 H148"/>
        <path d="M180 231 H270 M270 155 V306 M270 155 H298 M270 306 H298"/>
        <path d="M345 155 H410 M410 99 V210 M410 99 H448 M410 210 H448"/>
        <path d="M480 99 H560 M560 61 V137 M560 61 H618 M560 99 H618 M560 137 H618"/>
        <path d="M546 210 H588 M588 191 V229 M588 191 H618 M588 229 H618"/>
      </g>

      <g font-family="'Nanum Pen Script',sans-serif" fill="#33312C" font-size="30">
        <text x="20" y="323">복소수</text>
        <text x="150" y="240">실수</text>
        <text x="150" y="405" fill="#C0392B">허수</text>
        <text x="300" y="164" fill="#2E5C9A">유리수</text>
        <text x="300" y="315" fill="#7A4FB0">무리수</text>
        <text x="450" y="108">정수</text>
        <text x="450" y="219" font-size="25">정수가 아닌 유리수</text>
        <text x="620" y="70" font-size="26">자연수</text>
        <text x="620" y="108" font-size="26">0</text>
        <text x="620" y="146" font-size="26">음의 정수</text>
        <text x="620" y="200" font-size="26">유한소수</text>
        <text x="620" y="238" font-size="26">순환소수</text>
      </g>

      <g font-family="'Nanum Pen Script',sans-serif" font-size="19">
        <text x="20" y="345" fill="#6B675C">= 실수 + 허수</text>
        <text x="150" y="262" fill="#4E823E">수직선에 표시 가능 ○</text>
        <text x="300" y="186" fill="#6B675C">= a/b 꼴 (b≠0)</text>
        <text x="300" y="337" fill="#7A4FB0">분수로 표현 ✗ · 순환 안 하는 무한소수</text>
        <text x="150" y="427" fill="#C0392B">수직선에 표시 ✗ · 대소 비교 ✗</text>
      </g>

      <g font-family="'Nanum Pen Script',sans-serif" fill="#2E5C9A" font-size="22">
        <text x="710" y="70">1, 2, 3 …</text>
        <text x="710" y="146">-1, -2, -3 …</text>
        <text x="710" y="200">2.5, -0.4, ½ …</text>
        <text x="710" y="238">0.333… = ⅓</text>
        <text x="375" y="315">√2, -√5, 3+√11 …</text>
        <text x="215" y="405">i, 3+i, 4-3i …</text>
      </g>
    </svg>
  </div>

  <h2>이것만은 — 시험 함정</h2>
  <ul class="rules">
    <li><span class="hl">무한소수라고 다 무리수는 아니다</span>.
      <small>순환소수(0.333…)는 <span class="o">유리수</span> — ⅓ 처럼 분수로 쓸 수 있으니까.</small></li>
    <li>근호에 속지 말 것 — <span class="o">√9 = 3, √4 = 2</span> 라서 유리수(자연수).
      <small>√ 안이 제곱수면 무리수가 아니다.</small></li>
    <li><span class="hl">0은 정수·유리수지만 자연수는 아니다</span>.
      <small>자연수는 1부터 시작.</small></li>
    <li>정수도 유리수다 — <span class="o">4 = 4/1 = 8/2</span> 로 분수꼴이 되니까.</li>
  </ul>

  <h2>분류 퀴즈</h2>
  <div class="quiz">
    <div class="qtop"><span>맞춤 <b id="sc">0</b></span><span>푼 문제 <b id="tot">0</b></span></div>
    <div class="qnum" id="num">—</div>
    <p class="qask">유리수 · 무리수 · 허수 중 어디일까?</p>
    <div class="choices" id="ch"></div>
    <div class="fb" id="fb"></div>
    <button class="next" id="next">다음 →</button>
  </div>

  <p class="foot">한 장으로 외우는 수 체계 ✏️</p>
</div>

<script>
const QUIZ=[
  {n:'√2',a:'무리수',e:'순환하지 않는 무한소수.'},
  {n:'0.333…',a:'유리수',e:'순환소수 = ⅓ 로 분수 표현 가능.'},
  {n:'4',a:'유리수',e:'4 = 4/1, 정수는 유리수.'},
  {n:'π',a:'무리수',e:'원주율은 대표 무리수.'},
  {n:'3 + i',a:'허수',e:'i가 있고 허수부 ≠ 0.'},
  {n:'-7',a:'유리수',e:'음의 정수도 유리수.'},
  {n:'√9',a:'유리수',e:'√9 = 3, 함정! 근호 풀면 자연수.'},
  {n:'2i',a:'허수',e:'순허수.'},
  {n:'1.5',a:'유리수',e:'유한소수 = 3/2.'},
  {n:'-√5',a:'무리수',e:'근호가 풀리지 않음.'},
  {n:'0',a:'유리수',e:'0은 정수이자 유리수.'},
  {n:'√4',a:'유리수',e:'√4 = 2, 함정! 자연수.'},
  {n:'0.1010010001…',a:'무리수',e:'순환하지 않는 무한소수.'},
  {n:'⅔',a:'유리수',e:'분수 그 자체.'}
];
const OPTS=['유리수','무리수','허수'];
let order=[],i=0,sc=0,tot=0;
const num=document.getElementById('num'),ch=document.getElementById('ch'),fb=document.getElementById('fb'),
  next=document.getElementById('next'),scEl=document.getElementById('sc'),totEl=document.getElementById('tot');
const shuffle=a=>{a=a.slice();for(let k=a.length-1;k>0;k--){const j=Math.random()*(k+1)|0;[a[k],a[j]]=[a[j],a[k]];}return a;};
function load(){
  if(i>=order.length){order=shuffle(QUIZ);i=0;}
  const q=order[i]; num.textContent=q.n; fb.textContent=''; fb.className='fb';
  next.classList.remove('show'); ch.innerHTML='';
  OPTS.forEach(o=>{const b=document.createElement('button');b.className='choice';b.textContent=o;
    b.onclick=()=>answer(b,o,q);ch.appendChild(b);});
}
function answer(btn,choice,q){
  [...ch.children].forEach(c=>{c.disabled=true;if(c.textContent===q.a)c.classList.add('ok');});
  tot++;
  if(choice===q.a){sc++;fb.innerHTML='정답!';fb.className='fb ok';}
  else{btn.classList.add('no');fb.innerHTML='아쉬워요';fb.className='fb no';}
  fb.innerHTML+=`<small>${q.n} → ${q.a} · ${q.e}</small>`;
  scEl.textContent=sc; totEl.textContent=tot; next.classList.add('show');
}
next.onclick=()=>{i++;load();};
order=shuffle(QUIZ); load();
<\/script>
</body>
</html>

  </script>

  <script>
    /* 개념노트 목록 — 새 노트는 (1) 아래 배열에 한 줄 추가 + (2) 위에 <script type="text/html" id="note_아이디"> 블록 추가 */
    const NOTES = [
      { id:"number-system", title:"수 체계", desc:"복소수 분류 가지치기 + 함정 + 분류 퀸즈", tag:"수와 연산", icon:"🌳" },
    ];

    const listEl = document.getElementById('list');
    const listView = document.getElementById('listView');
    const detailView = document.getElementById('detailView');
    const viewer = document.getElementById('viewer');
    const dTitle = document.getElementById('dTitle');

    function openNote(n){
      const tpl = document.getElementById('note_'+n.id);
      if(!tpl){ return; }
      dTitle.textContent = n.title;
      viewer.srcdoc = tpl.textContent;
      listView.hidden = true; detailView.hidden = false;
      window.scrollTo(0,0);
    }
    function showList(){
      detailView.hidden = true; listView.hidden = false;
      viewer.srcdoc = "";
    }
    document.getElementById('backBtn').addEventListener('click', showList);

    if(!NOTES.length){
      listEl.innerHTML = '<div class="empty">아직 노트가 없어요.</div>';
    } else {
      NOTES.forEach(n=>{
        const b = document.createElement('button');
        b.className = 'note';
        b.innerHTML =
          '<span class="ic">'+(n.icon||'📄')+'</span>'+
          '<span class="tx">'+(n.tag?('<span class="tag">'+n.tag+'</span>'):'')+
          '<h2>'+n.title+'</h2>'+(n.desc?('<p>'+n.desc+'</p>'):'')+'</span>'+
          '<span class="go">→</span>';
        b.addEventListener('click', ()=>openNote(n));
        listEl.appendChild(b);
      });
    }
  </script>
</body>
</html>
