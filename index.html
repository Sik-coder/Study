<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>공부방 · 과목 선택</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2A2A33; --muted:#7A7A86; --faint:#A8A8B3;
    --eng:'Space Grotesk', system-ui, sans-serif;
    --kor:'Noto Sans KR', system-ui, sans-serif;
    /* 영어 = 따뜻한 주황 */
    --en:#B26A2B; --en-dark:#8F5320; --en-soft:#F6E7D4; --en-paper:#FCF8F1;
    /* 수학 = 파랑 */
    --ma:#2F4B9A; --ma-dark:#23397A; --ma-soft:#E9EDF8; --ma-paper:#F6F7FB;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{
    font-family:var(--kor); color:var(--ink);
    background:linear-gradient(165deg,#FAF7F2,#F1F1F6);
    min-height:100vh; min-height:100dvh;
    -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    display:flex; align-items:center; justify-content:center;
  }
  .wrap{width:100%; max-width:480px; padding:32px 22px 40px}
  .brand{display:flex; flex-direction:column; align-items:center; text-align:center; margin-bottom:28px}
  .brand .ring{width:46px; height:46px; border-radius:50%; border:3px solid var(--en); border-right-color:var(--ma); margin-bottom:14px; transform:rotate(-20deg)}
  .brand h1{font-size:23px; font-weight:900; letter-spacing:-.01em}
  .brand small{display:block; font-family:var(--eng); font-size:11px; font-weight:600; letter-spacing:.18em; color:var(--faint); text-transform:uppercase; margin-top:5px}
  .brand p{font-size:13.5px; color:var(--muted); margin-top:12px}
  .pick{display:flex; flex-direction:column; gap:16px; margin-top:6px}
  .card{display:flex; align-items:center; gap:16px; width:100%; text-align:left; text-decoration:none; color:inherit; border-radius:22px; padding:22px 20px; border:1.5px solid; box-shadow:0 18px 40px -26px rgba(40,40,60,.5); transition:transform .12s ease, box-shadow .12s ease}
  .card:active{transform:scale(.985)}
  .card .ic{width:58px; height:58px; flex:none; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:30px}
  .card .tx{flex:1}
  .card .tx h2{font-size:19px; font-weight:900; display:flex; align-items:center; gap:8px}
  .card .tx p{font-size:13px; color:var(--muted); margin-top:3px; font-weight:500}
  .card .go{font-family:var(--eng); font-weight:700; font-size:20px; flex:none}

  .card.en{background:var(--en-paper); border-color:var(--en-soft)}
  .card.en .ic{background:var(--en-soft); color:var(--en-dark)}
  .card.en .tx h2{color:var(--en-dark)}
  .card.en .go{color:var(--en)}
  .card.en .badge{font-family:var(--eng); font-size:10.5px; font-weight:700; letter-spacing:.08em; color:var(--en-dark); background:var(--en-soft); padding:2px 8px; border-radius:99px}

  .card.ma{background:var(--ma-paper); border-color:var(--ma-soft)}
  .card.ma .ic{background:var(--ma-soft); color:var(--ma-dark)}
  .card.ma .tx h2{color:var(--ma-dark)}
  .card.ma .go{color:var(--ma)}
  .card.ma .badge{font-family:var(--eng); font-size:10.5px; font-weight:700; letter-spacing:.08em; color:var(--ma-dark); background:var(--ma-soft); padding:2px 8px; border-radius:99px}

  .foot{text-align:center; font-size:12px; color:var(--faint); margin-top:26px; line-height:1.7}
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <span class="ring"></span>
      <h1>공부방</h1>
      <small>Study Room</small>
      <p>오늘은 어떤 공부를 해볼까요?</p>
    </div>

    <div class="pick">
      <a class="card en" href="combined.html">
        <span class="ic">📘</span>
        <span class="tx">
          <h2>영어 <span class="badge">WORDS</span></h2>
          <p>수능 영단어 · 단어 + 예문 카드, 시험까지</p>
        </span>
        <span class="go">→</span>
      </a>

      <a class="card ma" href="math.html">
        <span class="ic">➗</span>
        <span class="tx">
          <h2>수학 <span class="badge">MATH</span></h2>
          <p>문과 수학 기초 개념 · 중학교 / 고등학교</p>
        </span>
        <span class="go">→</span>
      </a>

      <a class="card ma" href="notes.html">
        <span class="ic">📝</span>
        <span class="tx">
          <h2>수학 개념노트 <span class="badge">NOTES</span></h2>
          <p>한 장으로 외우는 핵심 개념 정리</p>
        </span>
        <span class="go">→</span>
      </a>
    </div>

    <div class="foot">진도는 과목마다 따로 저장돼요 · 언제든 이 화면으로 돌아올 수 있어요</div>
  </div>
</body>
</html>
