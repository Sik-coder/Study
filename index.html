<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="공부방">
<meta name="theme-color" content="#22323A">
<title>나의 공부방</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{ --eng:'Space Grotesk',system-ui,sans-serif; --kor:'Noto Sans KR',system-ui,sans-serif; }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{font-family:var(--kor); color:#1F262B; background:linear-gradient(165deg,#E7ECEA,#EEF1EC 55%,#E9ECF3);
    min-height:100vh; min-height:100dvh; -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center;
    padding:calc(28px + env(safe-area-inset-top)) 20px calc(28px + env(safe-area-inset-bottom))}
  .wrap{width:100%; max-width:460px}
  .hero{text-align:center; margin-bottom:30px}
  .hero .kk{display:inline-flex; gap:6px; margin-bottom:16px}
  .hero .kk i{width:9px; height:9px; border-radius:50%; display:block}
  .hero h1{font-size:25px; font-weight:700; letter-spacing:-.03em}
  .hero p{font-size:13.5px; color:#6B7280; margin-top:7px}
  .cards{display:flex; flex-direction:column; gap:14px}
  .scard{display:block; text-decoration:none; color:inherit; background:#fff; border:1px solid rgba(0,0,0,.06);
    border-radius:20px; padding:22px 22px; box-shadow:0 18px 40px -24px rgba(28,40,50,.5);
    transition:transform .14s ease, box-shadow .2s}
  .scard:hover{transform:translateY(-3px); box-shadow:0 26px 50px -24px rgba(28,40,50,.55)}
  .scard:active{transform:translateY(-1px)}
  .scard .icon{width:48px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center; margin-bottom:16px}
  .scard h2{font-size:19px; font-weight:700; letter-spacing:-.02em; display:flex; align-items:center; justify-content:space-between}
  .scard h2 .go{font-size:20px; opacity:.5}
  .scard .sub{font-size:13px; color:#6B7280; margin-top:6px; line-height:1.55}
  .scard .tag{display:inline-block; margin-top:13px; font-family:var(--eng); font-size:11.5px; font-weight:600; letter-spacing:.04em; padding:5px 11px; border-radius:99px}
  .vocab .icon{background:#E2EEED; color:#0E7C7B}
  .vocab .tag{background:#E2EEED; color:#0A5F5E}
  .math .icon{background:#E9EDF8; color:#2F4B9A}
  .math .tag{background:#E9EDF8; color:#23397A}
  .foot{text-align:center; font-size:11.5px; color:#9AA1AD; margin-top:26px; line-height:1.7}
</style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <span class="kk"><i style="background:#0E7C7B"></i><i style="background:#E2A23B"></i><i style="background:#2F4B9A"></i></span>
      <h1>나의 공부방</h1>
      <p>영단어와 수학을 한곳에서 · 어느 기기에서나</p>
    </div>
    <div class="cards">
      <a class="scard vocab" href="vocab.html">
        <span class="icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 4h9a3 3 0 0 1 3 3v13l-6-3-6 3V4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
        </span>
        <h2>수능 영단어 2000 <span class="go">→</span></h2>
        <div class="sub">빈출 영단어 2,082개를 플래시카드로. 발음 듣기·뜻 가리기·외운 단어 자동 저장.</div>
        <span class="tag">2,082 WORDS · 105 DAYS</span>
      </a>
      <a class="scard math" href="math.html">
        <span class="icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 19 Q12 2 21 19" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/><line x1="3" y1="19" x2="21" y2="19" stroke="currentColor" stroke-width="1.5" opacity=".5"/></svg>
        </span>
        <h2>문과 수학 기초 개념 <span class="go">→</span></h2>
        <div class="sub">중·고 핵심 개념 42개. 개념 + 공식 + 문제 + 풀이 + 관련 영상까지 한 세트.</div>
        <span class="tag">42 CONCEPTS · 중 · 고</span>
      </a>
    </div>
    <div class="foot">휴대폰에서는 공유 → ‘홈 화면에 추가’ 하면 앱처럼 전체화면으로 열려요</div>
  </div>
</body>
</html>
